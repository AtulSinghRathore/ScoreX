name: ScoreX Source Bootstrap

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/scorex-bootstrap.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Decode validated ScoreX source
        shell: bash
        run: |
          set -euo pipefail
          cat .scorex-payload/part-* | base64 --decode > /tmp/scorex-source.tar.gz
          printf '%s  %s\n' \
            'cbba0a344f3654743b0cf7f7db8a40924868fcfe2374a8cb1c2b61fb934d1ded' \
            '/tmp/scorex-source.tar.gz' | sha256sum --check -
          tar -xzf /tmp/scorex-source.tar.gz -C .
          rm -rf .scorex-payload
          rm -f .github/workflows/scorex-bootstrap.yml

      - name: Commit ScoreX application
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ScoreX Builder"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Build ScoreX virtual sports market demo"
          git push origin HEAD:main
